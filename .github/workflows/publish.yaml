name: Build and publish python package

on:
    release:
        types: [published]

jobs:
    publish-service-client-package:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  python-version: "3.12"

            - name: Set project version to the release tag
              env:
                  TAG: ${{ github.event.release.tag_name }}
              run: |
                  VERSION="${TAG#v}"
                  echo "Release version: $VERSION"
                  uv version --no-sync "$VERSION"

            - name: Commit version bump back to main
              env:
                  TAG: ${{ github.event.release.tag_name }}
              run: |
                  VERSION="${TAG#v}"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add pyproject.toml uv.lock
                  if git diff --cached --quiet; then
                      echo "Version already $VERSION, nothing to commit"
                  else
                      git commit -m "Set version to $VERSION for release"
                      git push origin HEAD:main
                  fi

            - name: Build package
              run: uv build

            - name: Publish PyPi package
              run: uv publish --token ${{ secrets.PUBLISH_REGISTRY_PASSWORD }}
