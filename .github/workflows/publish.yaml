name: Build and publish python package

on:
    release:
        types: [published]

jobs:
    publish-service-client-package:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  python-version: "3.12"

            - name: Build package
              run: uv build

            - name: Publish PyPi package
              run: uv publish --token ${{ secrets.PUBLISH_REGISTRY_PASSWORD }}
